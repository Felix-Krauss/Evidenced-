<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supplements – Evidenced</title>
  <meta name="description" content="Alle Supplements mit nachgewiesener Evidenz. Filtere nach Kategorie oder Evidenzstärke.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-container">
      <a href="index.html" class="navbar-brand">Evidenced</a>
      <div class="navbar-links">
        <a href="index.html">Start</a>
        <a href="supplements.html" class="active">Supplements</a>
        <a href="stacks.html">Stacks</a>
        <a href="weak-evidence.html">Hype-Check</a>
        <a href="news.html">News</a>
      </div>
      <button class="pillbox-toggle" onclick="togglePillBox()">
        💊 <span id="pillbox-count">0</span>
      </button>
    </div>
  </nav>

  <section class="section">
    <div class="container">
      <h1 class="section-title">Alle Supplements</h1>
      
      <!-- Filter -->
      <div class="filters">
        <div class="filter-group">
          <label for="evidence-filter">Evidenz:</label>
          <select id="evidence-filter" onchange="filterSupplements()">
            <option value="all">Alle</option>
            <option value="stark">Stark</option>
            <option value="mittel">Mittel</option>
            <option value="schwach">Schwach</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="category-filter">Kategorie:</label>
          <select id="category-filter" onchange="filterSupplements()">
            <option value="all">Alle</option>
            <option value="basics">Basics</option>
            <option value="hype-check">Hype-Check</option>
          </select>
        </div>
        <div class="filter-group">
          <input type="text" id="search-filter" placeholder="Suche..." oninput="filterSupplements()">
        </div>
      </div>

      <!-- Supplement-Grid -->
      <div id="all-supplements-grid" class="supplement-grid"></div>
    </div>
  </section>

  <!-- Pillenbox-Drawer -->
  <div id="pillbox-drawer" class="pillbox-drawer">
    <div class="pillbox-header">
      <h3>Deine Pillenbox</h3>
      <button onclick="togglePillBox()" class="pillbox-close">×</button>
    </div>
    <div id="pillbox-items" class="pillbox-items"></div>
    <div class="pillbox-footer">
      <div class="pillbox-total">
        <span>Tageskosten:</span>
        <strong id="pillbox-total-price">0,00 €</strong>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
